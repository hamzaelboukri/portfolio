<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Critical first paint before the JS bundle (avoids empty #root in slow/throttled runs e.g. Lighthouse) -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #2d3222;
      }
      #root {
        min-height: 100%;
      }
    </style>
    <title>Portfolio</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Visible text + background before the JS bundle (Chrome FCP; avoids Lighthouse NO_FCP
      when throttling delays React). Replaced on root.render().
    -->
    <div id="root">
      <div
        class="static-fcp"
        style="
          min-height: 100vh;
          margin: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #2d3222;
          color: #f0f0eb;
          font: 500 0.9rem/1.4 system-ui, -apple-system, 'Segoe UI', sans-serif;
        "
      >
        <span class="static-fcp-text">Loading…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
